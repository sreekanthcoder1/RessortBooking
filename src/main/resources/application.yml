server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
            allowedHeaders: ["*"]
            allowCredentials: true

      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: cottage-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/cottages/**, /uploads/**

        - id: booking-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: notification-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/notifications/**

        - id: ai-service
          uri: http://localhost:8000
          predicates:
            - Path=/api/ai/**

app:
  jwt:
    secret: ${JWT_SECRET:your-default-secret-change-in-production-make-it-long}

---
spring:
  config:
    activate:
      on-profile: docker
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates: [Path=/api/auth/**]
        - id: cottage-service
          uri: http://cottage-service:8082
          predicates: [Path=/api/cottages/**, /uploads/**]
        - id: booking-service
          uri: http://booking-service:8083
          predicates: [Path=/api/bookings/**]
        - id: payment-service
          uri: http://payment-service:8084
          predicates: [Path=/api/payments/**]
        - id: notification-service
          uri: http://notification-service:8085
          predicates: [Path=/api/notifications/**]
        - id: ai-service
          uri: http://ai-service:8000
          predicates: [Path=/api/ai/**]
