server:
  port: 8082

spring:
  application:
    name: cottage-service

  datasource:
    url: jdbc:mysql://localhost:3306/cottagedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:162002}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

app:
  jwt:
    secret: ${JWT_SECRET:your-default-secret-change-in-production-make-it-long}

  upload:
    # Local uploads folder (for dev). In prod, swap for S3/Cloudinary.
    dir: uploads/cottages

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/cottagedb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    password: ${MYSQL_PASSWORD}
